services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: wrei
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/app/backend
      - wrei_photos:/app/photos       # zdjęcia pobrane przez CV
    environment:
      POSTGRES_DB: wrei
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      # Ollama działa na HOŚCIE — host.docker.internal to Windows/Mac gateway
      OLLAMA_URL: http://host.docker.internal:11434/api/chat
      OLLAMA_MODEL: qwen2.5:7b
      OLLAMA_VISION_MODEL: moondream
      # Telegram (wypełnij przy wdrożeniu Fazy 5)
      TELEGRAM_TOKEN: ""
      TELEGRAM_CHAT_ID: ""
      # Multi-miasto: comma-separated slugi
      TARGET_CITIES: warszawa
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend


volumes:
  pgdata:
  wrei_photos:
