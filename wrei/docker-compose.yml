services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: wrei
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app/backend
      - wrei_photos:/app/photos
    environment:
      POSTGRES_DB: wrei
      WREI_API_KEY: "secret-key-123"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      REDIS_HOST: redis
      OLLAMA_URL: http://host.docker.internal:11434/api/chat
      OLLAMA_MODEL: qwen2.5:7b
      OLLAMA_VISION_MODEL: moondream
      TELEGRAM_TOKEN: ""
      TELEGRAM_CHAT_ID: ""
      TARGET_CITIES: warszawa
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: arq backend.tasks.WorkerSettings
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app/backend
      - wrei_photos:/app/photos
    environment:
      POSTGRES_DB: wrei
      WREI_API_KEY: "secret-key-123"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      REDIS_HOST: redis
      OLLAMA_URL: http://host.docker.internal:11434/api/chat
      OLLAMA_MODEL: qwen2.5:7b
      OLLAMA_VISION_MODEL: moondream
      TELEGRAM_TOKEN: ""
      TELEGRAM_CHAT_ID: ""
      TARGET_CITIES: warszawa
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend


volumes:
  pgdata:
  wrei_photos:
