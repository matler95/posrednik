services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: wrei
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/app/backend
      - wrei_photos:/app/photos       # zdjęcia pobrane przez CV
    environment:
      POSTGRES_DB: wrei
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      # Ollama działa na HOŚCIE — host.docker.internal to Windows/Mac gateway
      OLLAMA_URL: http://host.docker.internal:11434/api/chat
      OLLAMA_MODEL: qwen2.5:7b
      OLLAMA_VISION_MODEL: moondream
      # Telegram (wypełnij przy wdrożeniu Fazy 5)
      TELEGRAM_TOKEN: ""
      TELEGRAM_CHAT_ID: ""
      # Multi-miasto: comma-separated slugi
      TARGET_CITIES: warszawa
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard:/app/dashboard
    environment:
      BACKEND_URL: http://backend:8000
      STREAMLIT_SERVER_FILE_WATCHER_TYPE: poll
    extra_hosts:

      - "host.docker.internal:host-gateway"


volumes:
  pgdata:
  wrei_photos:
